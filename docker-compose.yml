

services:
  db:
    image: postgres:15-alpine
    container_name: wtf_db
    environment:
      POSTGRES_DB: wtf_livepulse
      POSTGRES_USER: wtf
      POSTGRES_PASSWORD: wtf_secret
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wtf -d wtf_livepulse"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: wtf_backend
    environment:
      DATABASE_URL: postgres://wtf:wtf_secret@db:5432/wtf_livepulse
      PORT: 3001
      NODE_ENV: development
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
    command: node src/app.js

  frontend:
    build: ./frontend
    container_name: wtf_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
